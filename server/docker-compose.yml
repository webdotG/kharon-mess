services:

  walkie-server:
    build: .
    container_name: kharon-server
    restart: unless-stopped
    environment:
      - PORT=3000
      - MSG_TTL_MS=${MSG_TTL_MS:-120000}
      - MAX_MSG_SIZE=${MAX_MSG_SIZE:-4096}
      - MAX_QUEUE_PER_USER=${MAX_QUEUE_PER_USER:-50}
      - MAX_CONNS_PER_IP=${MAX_CONNS_PER_IP:-3}
      - MAX_CLIENTS=${MAX_CLIENTS:-100}
      - MSG_RATE_LIMIT=${MSG_RATE_LIMIT:-3}
      - MSG_BUCKET_MAX=${MSG_BUCKET_MAX:-9}
    expose:
      - "3000"
    security_opt:
      - no-new-privileges:true
    read_only: true
    tmpfs:
      - /tmp:size=64m,mode=1777
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"
    networks:
      - kharon-net
    deploy:
      resources:
        limits:
          cpus: '2'
          memory: 512M

  nginx:
    image: nginx:alpine
    container_name: kharon-nginx
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
      - ${CERT_PATH:-./certs/fullchain.pem}:/etc/nginx/certs/fullchain.pem:ro
      - ${KEY_PATH:-./certs/privkey.pem}:/etc/nginx/certs/privkey.pem:ro
    security_opt:
      - no-new-privileges:true
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"
    depends_on:
      - walkie-server
    networks:
      - kharon-net

networks:
  kharon-net:
    driver: bridge
