# ─── Зоны rate limiting и conn limiting ──────────────────────────────────────
#
# Объявляем в http-блоке, используем в server-блоке.
# $binary_remote_addr — IP клиента в бинарном виде (экономит память vs $remote_addr)

# Зона для ограничения частоты новых подключений
# 10m = 10 МБ памяти ≈ 160 000 уникальных IP
# rate=5r/s = максимум 5 новых WS-соединений в секунду с одного IP
limit_req_zone $binary_remote_addr zone=ws_handshake:10m rate=5r/s;

# Зона для ограничения одновременных соединений
limit_conn_zone $binary_remote_addr zone=ws_conn:10m;

# Логировать блокировки rate limit
limit_req_log_level warn;
limit_conn_log_level warn;

events {
    worker_connections 1024;
}

http {
    # Скрываем версию nginx из заголовков и error pages
    server_tokens off;

    # Таймауты — защита от slowloris-атак
    client_header_timeout  10s;
    client_body_timeout    10s;
    keepalive_timeout      65s;
    send_timeout           10s;

    # Максимальный размер тела запроса (для WS фреймов)
    client_max_body_size   16k;
    client_body_buffer_size 16k;

    upstream walkie_backend {
        server walkie-server:3000;

        # Keepalive к backend — переиспользуем соединения
        keepalive 16;
    }

    # ── HTTP → HTTPS редирект ─────────────────────────────────────────────────
    server {
        listen 80;
        server_name _;

        # Только редирект — больше ничего не обрабатываем
        return 301 https://$host$request_uri;
    }

    # ── HTTPS + WebSocket ─────────────────────────────────────────────────────
    server {
        listen 443 ssl;
        server_name _;

        # ── TLS ──────────────────────────────────────────────────────────────
        ssl_certificate     /etc/nginx/certs/fullchain.pem;
        ssl_certificate_key /etc/nginx/certs/privkey.pem;

        # Только современные протоколы
        ssl_protocols TLSv1.2 TLSv1.3;

        # Сильные шифры, без устаревших
        ssl_ciphers ECDHE-ECDSA-AES128-GCM-SHA256:ECDHE-RSA-AES128-GCM-SHA256:ECDHE-ECDSA-AES256-GCM-SHA384:ECDHE-RSA-AES256-GCM-SHA384:ECDHE-ECDSA-CHACHA20-POLY1305:ECDHE-RSA-CHACHA20-POLY1305;
        ssl_prefer_server_ciphers off; # В TLS 1.3 клиент выбирает — это норма

        # Сессионный кэш — ускоряет переподключения
        ssl_session_cache   shared:SSL:10m;
        ssl_session_timeout 1d;
        ssl_session_tickets off; # Отключаем — уязвимость forward secrecy

        # OCSP stapling — клиент не ходит к CA за проверкой сертификата
        ssl_stapling on;
        ssl_stapling_verify on;

        # ── Заголовки безопасности ────────────────────────────────────────────

        # HSTS — браузер больше никогда не пойдёт по HTTP
        add_header Strict-Transport-Security "max-age=63072000; includeSubDomains" always;

        # Запрет на встраивание в iframe
        add_header X-Frame-Options "DENY" always;

        # Запрет угадывания Content-Type
        add_header X-Content-Type-Options "nosniff" always;

        # Минимальная политика реферера
        add_header Referrer-Policy "no-referrer" always;

        # Разрешаем только WebSocket соединения, запрещаем всё остальное в браузере
        add_header Content-Security-Policy "default-src 'none'" always;

        # Убираем заголовок X-Powered-By если вдруг backend его добавляет
        proxy_hide_header X-Powered-By;

        # ── Health check ──────────────────────────────────────────────────────
        location /health {
            # Доступен только с localhost (мониторинг)
            allow 127.0.0.1;
            allow 172.16.0.0/12; # Docker сети
            deny all;

            proxy_pass http://walkie_backend/health;
            proxy_set_header Host $host;
        }

        # ── WebSocket endpoint ────────────────────────────────────────────────
        location / {

            # Валидация: принимаем ТОЛЬКО WebSocket Upgrade запросы
            # Если кто-то шлёт обычный HTTP — дропаем
            if ($http_upgrade != "websocket") {
                return 426 "Upgrade Required";
            }

            # Rate limiting: максимум 5 новых соединений/сек с одного IP
            # burst=10 — разрешаем кратковременный всплеск до 10
            # nodelay — не ставим в очередь, сразу режем
            limit_req zone=ws_handshake burst=10 nodelay;

            # Максимум 10 одновременных соединений с одного IP
            # (дополнительная защита на уровне nginx, hub.js ограничивает до 3)
            limit_conn ws_conn 10;

            proxy_pass http://walkie_backend;

            # WebSocket upgrade
            proxy_http_version 1.1;
            proxy_set_header Upgrade    $http_upgrade;
            proxy_set_header Connection "upgrade";

            # Передаём реальный IP — hub.js использует для rate limiting
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Real-IP       $remote_addr;
            proxy_set_header Host            $host;

            # Долгие WebSocket соединения — увеличиваем таймауты
            proxy_read_timeout  3600s;
            proxy_send_timeout  3600s;

            # Отключаем буферизацию — для WS не нужна, только задержки добавляет
            proxy_buffering off;
        }
    }
}
